<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin:0;
            font-family:Arial;
            display:flex;
            background:#0f2027;
            color:white;
        }

        .sidebar {
            width:220px;
            background:#1f1f2f;
            height:100vh;
            padding:20px;
        }

        .main {
            flex:1;
            padding:20px;
        }

        .card {
            background:#2b2b3c;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        input, select {
            width:100%;
            padding:10px;
            margin:5px 0;
        }

        button {
            padding:12px;
            width:100%;
            background:#00d4ff;
            border:none;
            border-radius:10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>EyeAI</h2>
</div>

<div class="main">

    <h2>Eye Risk Dashboard</h2>

    <form action="/predict" method="post">

        <div class="card">
            <label>Screen Time (0–24)</label>
            <input type="number" name="screen" min="0" max="24" required>

            <label>Session Duration (minutes)</label>
            <input type="number" name="session" required>

            <label>Night Usage (0–11)</label>
            <input type="number" name="night" min="0" max="11" required>

            <label>Brightness (1–10)</label>
            <input type="number" name="brightness" min="1" max="10" required>

            <label>Dark Mode</label>
            <select name="dark">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Gender</label>
            <select name="gender">
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>

            <label>Ambient Light (1–10)</label>
            <input type="number" name="ambient" min="1" max="10" required>

            <button type="submit">Predict Risk</button>
        </div>

    </form>

</div>

</body>
</html>
