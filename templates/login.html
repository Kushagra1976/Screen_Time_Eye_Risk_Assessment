<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }
        .box{
            background:white;
            padding:30px;
            border-radius:15px;
            text-align:center;
        }
        input{
            margin:10px;
            padding:10px;
            width:200px;
        }
        button{
            padding:10px;
            width:100%;
            background:#2a5298;
            color:white;
            border:none;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <form action="/login" method="post">
        <input name="username" placeholder="Username"><br>
        <input name="password" type="password" placeholder="Password"><br>
        <button>Login</button>
    </form>
</div>

</body>
</html>
